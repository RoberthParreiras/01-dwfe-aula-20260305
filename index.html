<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site de Notícias</title>
    <link rel="stylesheet" href="./assets/css/login/estilo.css">
    <script src="https://kit.fontawesome.com/2bb9939eec.js" crossorigin="anonymous"></script>
    <script src="./assets/js/login.js"></script>
</head>

<body>
    <header>
        <div class="logo">R</div>
        <h1 class="titulo">Meu site de notícias</h1>
    </header>
    <div class="container">
        <h1>Login</h1>
        <form>
            <div class="input-grupo">
                <i class="fas fa-envelope"></i>
                <input id="email" type="text" placeholder="informe seu email">
            </div>
            <div>
                <i class="fas fa-lock"></i>
                <input id="senha" type="password" placeholder="informe sua senha">
            </div>
                <button type="submit" onclick="verificarCredenciais(); return false;"><i class="fas fa-sign-in-alt"></i>Entrar</button>
        </form>
        <div class="links-auxiliares">
            <a href="#">Esqueceu a senha?</a>
            <span>-</span>
            <a href="#">Registre-se</a>
        </div>  
    </div>
</body>

</html>
